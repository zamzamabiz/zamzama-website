    /* ── Cookie Notice Init ─────────────────────────────────── */
    (function initCookie() {
      const notice = document.getElementById("cookie-notice");
      if (!notice) return;
      if (!localStorage.getItem("zc_cookie")) setTimeout(() => notice.classList.add("visible"), 1800);
      const dismiss = () => { notice.classList.remove("visible"); localStorage.setItem("zc_cookie", "1"); };
      document.getElementById("cookie-accept")?.addEventListener("click", dismiss);
      document.getElementById("cookie-decline")?.addEventListener("click", dismiss);
    })();

    /* ── Custom Hooks ───────────────────────────────────────── */
    const useReveal = (dir = "") => {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const cls = dir === "left" ? "reveal-left" : dir === "right" ? "reveal-right" : "reveal";
        el.classList.add(cls);
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { el.classList.add("visible"); obs.unobserve(el); } },
          { threshold: 0.12 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    };

    const useCounter = (target, duration = 1800) => {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            obs.unobserve(el);
            let n = 0;
            const step = Math.max(1, Math.ceil(target / (duration / 16)));
            const timer = setInterval(() => {
              n = Math.min(n + step, target);
              setCount(n);
              if (n >= target) clearInterval(timer);
            }, 16);
          }
        }, { threshold: 0.4 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [target, duration]);
      return { count, ref };
    };

    const useTypewriter = (words, speed = 85, pause = 2100) => {
      const [display, setDisplay] = useState("");
      const [idx, setIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);
      useEffect(() => {
        const word = words[idx];
        if (!deleting && display === word) {
          const t = setTimeout(() => setDeleting(true), pause);
          return () => clearTimeout(t);
        }
        if (deleting && display === "") {
          setDeleting(false);
          setIdx(i => (i + 1) % words.length);
          return;
        }
        const t = setTimeout(
          () => setDisplay(p => deleting ? p.slice(0, -1) : word.slice(0, p.length + 1)),
          deleting ? speed / 2.2 : speed
        );
        return () => clearTimeout(t);
      }, [display, deleting, idx, words, speed, pause]);
      return display;
    };

                          <label className="form-label" htmlFor="email">Email Address <span className="cf-req" aria-hidden="true">*</span></label>
                          <input id="email" name="email" type="email" required placeholder="you@company.com" aria-required="true"
                            className={`form-input ${errors.email ? "error" : ""}`} />
                          {errors.email && <span className="form-error-text" role="alert">{errors.email}</span>}
                        </div>
                      </div>

                      {/* Row 2 */}
                      <div className="contact-form-row">
                        <div className="contact-form-field">
                          <label className="form-label" htmlFor="phone">Phone / WhatsApp</label>
                          <input id="phone" name="phone" type="tel" placeholder="+92 300 123 4567" className="form-input" />
                        </div>
                        <div className="contact-form-field">
                          <label className="form-label" htmlFor="commodity">Commodity Interest</label>
                          <select id="commodity" name="commodity" defaultValue="" className="form-input">
                            <option value="" disabled>Select commodity…</option>
                            <option>Basmati Rice</option>
                            <option>Long-Grain Rice</option>
                            <option>Corn &amp; Animal Feed</option>
                            <option>Pulses &amp; Lentils</option>
                            <option>Spices &amp; Herbs</option>
                            <option>Oil Seeds</option>
                            <option>Other</option>
                          </select>
                        </div>
                      </div>

                      {/* Row 3 */}
                      <div className="contact-form-row">
                        <div className="contact-form-field">
                          <label className="form-label" htmlFor="company">Company Name</label>
                          <input id="company" name="company" type="text" placeholder="Your company" className="form-input" />
                        </div>
                        <div className="contact-form-field">
                          <label className="form-label" htmlFor="country">Destination Country</label>
                          <input id="country" name="country" type="text" placeholder="e.g. United Arab Emirates" className="form-input" />
                        </div>
                      </div>

                      {/* Message */}
                      <div className="contact-form-field contact-form-field--full">
                        <label className="form-label" htmlFor="message">Trade Requirement <span className="cf-req" aria-hidden="true">*</span></label>
                        <textarea id="message" name="message" required rows="4" aria-required="true"
                          placeholder="Specify commodity, volume (MT), packaging preference, destination port, and preferred Incoterms…"
                          className={`form-input resize-none ${errors.message ? "error" : ""}`} />
                        {errors.message && <span className="form-error-text" role="alert">{errors.message}</span>}
                      </div>

                      {/* Submit row */}
                      <div className="contact-form-submit-row">
                        <button type="submit" disabled={sending} aria-busy={sending} className="contact-submit-btn">
                          <Icon name={sending ? "fa-solid fa-spinner fa-spin" : "fa-solid fa-paper-plane"} size={14} color="#0e2a47" />
                          {sending ? "Sending…" : "Submit Inquiry"}
                        </button>
                        <span className="contact-response-badge">
                          <Icon name="fa-solid fa-clock" size={11} color="#c7a75b" />
                          Response within 24 hrs
                        </span>
                      </div>

                      

                    </form>
                  </>
                )}
              </div>

            </div>{/* /contact-grid */}
          </div>
        </section>
      );
    };

                  <button type="submit" className="footer-newsletter-btn">Subscribe</button>
                </form>
              )}
            </div>
          </div>

          {/* Main body */}

                ))}
              </div>
            </div>

            {/* Navigation */}
            <div>
              <h5 className="text-white font-bold text-xs uppercase tracking-widest mb-5">Navigation</h5>
              <ul className="space-y-3" role="list">
                {[["#about","About Us"],["#products","Products"],["#process","Trade Process"],["#compliance","Compliance"],["#contact","Contact"]].map(([href, label]) => (

    /* ═══════════════════════════════════════════════════════════
       UTILITIES
       ═══════════════════════════════════════════════════════════ */
    const ScrollToTop = () => {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const fn = () => setVisible(window.scrollY > 500);
        window.addEventListener("scroll", fn, { passive: true });
        return () => window.removeEventListener("scroll", fn);
      }, []);
      if (!visible) return null;
      return (
        <button
          onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
          className="fixed bottom-24 right-6 z-40 w-12 h-12 rounded-full bg-primary hover:bg-accent text-white flex items-center justify-center shadow-xl transition-all duration-300 hover:scale-110 border border-white/10"
          aria-label="Scroll back to top of page">
          <Icon name="fa-solid fa-arrow-up" size={15} color="white" />
        </button>
      );
    };

    const WhatsAppFloat = () => (
      <a href="https://wa.me/923202448055" target="_blank" rel="noopener noreferrer"
        className="whatsapp-float fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition-transform duration-300 hover:scale-110"
        style={{ background: "#25D366" }}
        aria-label="Chat with Zamzama Corporation on WhatsApp">
        <Icon name="fa-brands fa-whatsapp" size={28} color="white" />
      </a>

    const GradDivider = () => <hr className="grad-divider" aria-hidden="true" />;

    /* ═══════════════════════════════════════════════════════════
       APP ROOT
       ═══════════════════════════════════════════════════════════ */
    const App = () => {
      useEffect(() => {
        const loader = document.getElementById("preloader");
        if (!loader) return;
        const t1 = setTimeout(() => loader.classList.add("hidden"), 700);
        const t2 = setTimeout(() => loader.remove(), 1300);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);

      return (
        <>
          <AppHeader />
          <main id="main-content">
            <Hero />
            <StatsBar />
            <MarketsTicker />
            <About />
            <MissionValues />
            <GradDivider />
            <Leadership />
            <GradDivider />

            <NewsInsights />
            <CTABanner />

          <Footer />

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
